name: "demo_2026_workspace"
publish_to: "none"

environment:
  sdk: "3.11.1"

workspace:
  - packages/app
  - packages/core_navigation
  - packages/core_assets
  - packages/core_bloc
  - packages/core_chain
  - packages/core_dio
  - packages/core_failure
  - packages/core_platform
  - packages/core_result
  - packages/feature_home_screen
  - packages/feature_auth_screen
  - packages/feature_landing_screen
  - packages/feature_splash_screen

dev_dependencies:
  ignorium: ">=0.3.2"
  lintorium: "308.0.0"
  melos: "7.4.0"

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

  scripts:
    analyze:
      run: melos exec -- dart analyze .
      description: Analyze all packages

    format:
      run: melos exec -- dart format . --line-length 120
      description: Format all packages (line length 120)

    test:
      run: melos exec -- flutter test
      description: Run tests in all packages

    gen:
      run: melos exec --concurrency 4 -- dart run build_runner build --delete-conflicting-outputs
      description: Run code generation in all packages
      packageFilters:
        dependsOn: build_runner

    reinstall:
      description: Full clean and reinstall — wipes caches, generated files, then bootstraps, generates, and formats
      run: |
        set -e
        MELOS="$HOME/.pub-cache/bin/melos"

        echo "🧹 Cleaning pub cache..."
        dart pub cache clean --force

        echo "🔄 Reinstalling melos..."
        dart pub global activate melos 7.4.0

        echo "🧹 Flutter clean..."
        $MELOS exec --concurrency 1 -- flutter clean

        echo "🗑️  Removing generated files and build artifacts..."
        $MELOS exec -- bash -c "find . -name '*.freezed.dart' -o -name '*.g.dart' -o -name '*.gen.dart' -o -name '*.generated.dart' -o -name '*.gr.dart' | xargs rm -f; rm -rf .dart_tool build"

        echo "⚙️  Bootstrapping workspace..."
        $MELOS bootstrap

        echo "⚙️  Running code generation..."
        $MELOS run gen

        echo "✨ Formatting code..."
        $MELOS run format
